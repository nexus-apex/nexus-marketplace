{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} MarketOrder | NexusMarketplace{% endblock %}
{% block page_title %}{% if editing %}Edit MarketOrder{% else %}New MarketOrder{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Order Number</label>
        <input type="text" name="order_number" value="{{ record.order_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Buyer Name</label>
        <input type="text" name="buyer_name" value="{{ record.buyer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" name="store_name" value="{{ record.store_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Total</label>
        <input type="number" step="0.01" name="total" value="{{ record.total|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="confirmed" {% if record.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
          <option value="shipped" {% if record.status == 'shipped' %}selected{% endif %}>Shipped</option>
          <option value="delivered" {% if record.status == 'delivered' %}selected{% endif %}>Delivered</option>
          <option value="returned" {% if record.status == 'returned' %}selected{% endif %}>Returned</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Order Date</label>
        <input type="date" name="order_date" value="{{ record.order_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Payment</label>
        <select name="payment">
          <option value="paid" {% if record.payment == 'paid' %}selected{% endif %}>Paid</option>
          <option value="cod" {% if record.payment == 'cod' %}selected{% endif %}>COD</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} MarketOrder</button>
      <a href="/marketorders/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
